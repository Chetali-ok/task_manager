<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card card shadow-lg border-0 p-4 p-md-5">

    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="brand-icon mb-3">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="44" height="44" rx="12" fill="url(#grad)"/>
          <path d="M14 22L20 28L30 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6C63FF"/>
              <stop offset="1" stop-color="#3ECFCF"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h2 class="fw-bold mb-1">Welcome back</h2>
      <p class="text-muted small">Sign in to continue to your dashboard</p>
    </div>

    <!-- Username -->
    <div class="mb-3">
      <label for="username" class="form-label fw-semibold">Username</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-person text-muted"></i>
        </span>
        <input
          id="username"
          type="text"
          class="form-control border-start-0"
          placeholder="Enter your username"
          [(ngModel)]="username"
          name="username"
        />
      </div>
    </div>

    <!-- Password -->
    <div class="mb-4">
      <div class="d-flex justify-content-between align-items-center">
        <label for="password" class="form-label fw-semibold mb-0">Password</label>
        <a href="#" class="small text-decoration-none forgot-link">Forgot password?</a>
      </div>
      <div class="input-group mt-1">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-lock text-muted"></i>
        </span>
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          class="form-control border-start-0 border-end-0"
          placeholder="Enter your password"
          [(ngModel)]="password"
          name="password"
        />
        <button
          type="button"
          class="input-group-text bg-light border-start-0"
          (click)="showPassword = !showPassword"
        >
          <i class="bi text-muted" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button
      type="button"
      class="btn btn-primary-custom w-100 py-2 fw-semibold"
      (click)="login()"
    >
      Sign In
    </button>

    <!-- Sign up link -->
    <p class="text-center mt-4 mb-0 small text-muted">
      Don't have an account?
      <a routerLink="/register" class="text-decoration-none fw-semibold signup-link">Create one</a>
    </p>

  </div>
</div>
